<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiMax v6.3.1 - تحليل الأسهم الشرعية</title>
    <link rel="manifest" href="data:application/json;charset=utf-8,%7B%22background_color%22%3A%22%23f5f5f5%22%2C%22dir%22%3A%22rtl%22%2C%22display%22%3A%22standalone%22%2C%22name%22%3A%22OptiMax%22%2C%22orientation%22%3A%22any%22%2C%22scope%22%3A%22%2F%22%2C%22short_name%22%3A%22OptiMax%22%2C%22start_url%22%3A%22%2F%22%2C%22theme_color%22%3A%22%23667eea%22%2C%22id%22%3A%22OptiMax%22%2C%22description%22%3A%22%D8%AA%D8%AD%D9%84%D9%8A%D9%84%20%D8%A7%D8%AD%D8%AA%D8%B1%D8%A7%D9%81%D9%8A%20%D9%84%D9%84%D8%A3%D8%B3%D9%87%D9%85%20%D8%A7%D9%84%D8%B4%D8%B1%D8%B9%D9%8A%D8%A9%20%D8%A7%D9%84%D8%A3%D9%85%D8%B1%D9%8A%D9%83%D9%8A%D8%A9%20%D9%85%D8%AF%D8%B9%D9%88%D9%85%20%D8%A8%D8%A7%D9%84%D8%B0%D9%83%D8%A7%D8%A1%20%D8%A7%D9%84%D8%A7%D8%B5%D8%B7%D9%86%D8%A7%D8%B9%D9%8A%22%7D">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="تحليل احترافي للأسهم مدعوم بالذكاء الاصطناعي - OptiMax v6.3.1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .version {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            margin-top: 10px;
            font-weight: bold;
        }

        .credits {
            color: #999;
            font-size: 0.85em;
            margin-top: 10px;
            font-style: italic;
        }

        .search-box {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .search-input-container {
            display: flex;
            gap: 10px;
        }

        .search-input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #667eea;
            border-radius: 25px;
            font-size: 1em;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: #764ba2;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .search-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1em;
        }

        .search-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .search-hint {
            color: #999;
            font-size: 0.85em;
            margin-top: 10px;
            text-align: center;
        }

        .status-bar {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .market-open {
            background: #10b981;
            color: white;
        }

        .market-closed {
            background: #ef4444;
            color: white;
        }

        .loading {
            background: white;
            border-radius: 15px;
            padding: 60px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .loading-spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stock-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border-left: 5px solid #667eea;
        }

        .stock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stock-symbol {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .stock-price {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .stock-name {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 15px;
        }

        .stock-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 0.75em;
            color: #999;
            margin-bottom: 3px;
        }

        .info-value {
            font-size: 0.95em;
            font-weight: bold;
            color: #333;
        }

        .signal-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.9em;
            text-align: center;
        }

        .super-strong-buy {
            background: #059669;
            color: white;
        }

        .strong-buy {
            background: #10b981;
            color: white;
        }

        .buy {
            background: #3b82f6;
            color: white;
        }

        .hold {
            background: #f59e0b;
            color: white;
        }

        .sell {
            background: #ef4444;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            overflow-y: auto;
        }

        .modal-content {
            background-color: white;
            margin: 50px auto;
            padding: 0;
            border-radius: 20px;
            width: 90%;
            max-width: 900px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideDown 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 20px 20px 0 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .close {
            color: white;
            position: absolute;
            left: 20px;
            top: 20px;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: all 0.3s;
        }

        .close:hover {
            background: rgba(255,255,255,0.3);
        }

        .modal-body {
            padding: 30px;
        }

        .summary-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 25px;
            text-align: center;
        }

        .summary-score {
            font-size: 3em;
            font-weight: bold;
            margin: 20px 0;
        }

        .summary-signal {
            font-size: 1.5em;
            font-weight: bold;
            padding: 10px 30px;
            border-radius: 25px;
            display: inline-block;
            background: rgba(255,255,255,0.2);
            margin-top: 10px;
        }

        .confirmation-section {
            background: #fff3cd;
            padding: 25px;
            border-radius: 15px;
            border-right: 4px solid #f59e0b;
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.4em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .confirmation-signals {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .signal-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .signal-item.positive {
            border-left: 4px solid #10b981;
        }

        .signal-item.negative {
            border-left: 4px solid #ef4444;
        }

        .signal-item.neutral {
            border-left: 4px solid #f59e0b;
        }

        .signal-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .signal-value {
            font-size: 1.1em;
            font-weight: bold;
            color: #333;
        }

        .verdict-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-top: 15px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .verdict-score {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .verdict-text {
            font-size: 1.2em;
            font-weight: bold;
        }

        .verdict-text.enter {
            color: #10b981;
        }

        .verdict-text.watch {
            color: #f59e0b;
        }

        .verdict-text.avoid {
            color: #ef4444;
        }

        .analysis-section {
            margin-bottom: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 15px;
            border-right: 4px solid #667eea;
        }

        .direction-banner {
            padding: 20px;
            border-radius: 10px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.1em;
        }

        .direction-banner.bullish {
            background: #d1fae5;
            color: #065f46;
            border: 2px solid #10b981;
        }

        .direction-banner.bearish {
            background: #fee2e2;
            color: #991b1b;
            border: 2px solid #ef4444;
        }

        .direction-banner.neutral {
            background: #fef3c7;
            color: #92400e;
            border: 2px solid #f59e0b;
        }

        .direction-note {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9em;
            color: #666;
            border-right: 3px solid #667eea;
        }

        .confidence-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .confidence-item {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .confidence-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 8px;
        }

        .confidence-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .targets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .target-box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .target-label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 5px;
        }

        .target-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .target-value.positive {
            color: #10b981;
        }

        .target-value.negative {
            color: #ef4444;
        }

        .summary-text {
            background: white;
            padding: 20px;
            border-radius: 10px;
            line-height: 1.8;
            color: #333;
            margin: 15px 0;
        }

        .list-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin: 15px 0;
        }

        .list-section ul {
            list-style: none;
            padding: 0;
        }

        .list-section li {
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            background: #f8f9fa;
            position: relative;
            padding-right: 30px;
        }

        .list-section li:before {
            content: "•";
            position: absolute;
            right: 10px;
            font-size: 1.5em;
            color: #667eea;
        }

        .risk-item:before {
            color: #ef4444 !important;
            content: "⚠️" !important;
        }

        .opportunity-item:before {
            color: #10b981 !important;
            content: "✅" !important;
        }

        .alert-item:before {
            color: #f59e0b !important;
            content: "⚡" !important;
        }

        .glossary-grid {
            display: grid;
            gap: 15px;
        }

        .glossary-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            border-right: 3px solid #667eea;
        }

        .glossary-term {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .glossary-definition {
            color: #666;
            line-height: 1.6;
        }

        .indicators-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .indicator-box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .indicator-label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 5px;
        }

        .indicator-value {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }

        .refresh-btn {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: #667eea;
            color: white;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
        }

        .positive {
            color: #10b981;
        }

        .negative {
            color: #ef4444;
        }

        .divider {
            height: 2px;
            background: linear-gradient(to left, transparent, #667eea, transparent);
            margin: 30px 0;
        }

        @media (max-width: 768px) {
            .stock-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.8em;
            }
            
            .status-bar {
                flex-direction: column;
                gap: 10px;
            }

            .search-input-container {
                flex-direction: column;
            }

            .confidence-box, .targets-grid, .indicators-grid, .confirmation-signals {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 OptiMax</h1>
            <p>تحليل احترافي للأسهم مدعوم بالذكاء الاصطناعي</p>
            <span class="version">v6.3.1</span>
            <div class="credits">تطوير: عبدالرحمن أبوحيمد أبوياسر + Claude AI</div>
        </div>

        <div class="search-box">
            <div class="search-input-container">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="ابحث عن أي سهم بالرمز (AAPL, MSFT, TSLA...)"
                    onkeypress="if(event.key === 'Enter') searchStock()"
                >
                <button class="search-btn" onclick="searchStock()">🔍 تحليل</button>
            </div>
            <div class="search-hint">💡 يمكنك تحليل أي سهم - حتى خارج القائمة الشرعية</div>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <span id="marketStatus" class="status-badge">جاري التحميل...</span>
                <span id="updateTime"></span>
            </div>
            <button class="refresh-btn" onclick="loadData()">🔄 تحديث</button>
        </div>

        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <h2>جاري تحليل الأسهم...</h2>
            <p>قد يستغرق هذا 1-2 دقيقة</p>
        </div>

        <div id="error" style="display: none;" class="error"></div>

        <div id="stockGrid" class="stock-grid" style="display: none;"></div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="close" onclick="closeModal()">&times;</span>
                <h2 id="modalTitle" style="margin-top: 10px;"></h2>
                <p id="modalSubtitle" style="margin-top: 5px; opacity: 0.9;"></p>
            </div>
            <div class="modal-body" id="modalBody">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>جاري تحليل السهم...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://optimax-backend.vercel.app';

        async function loadData() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const grid = document.getElementById('stockGrid');

            loading.style.display = 'block';
            error.style.display = 'none';
            grid.style.display = 'none';

            try {
                const response = await fetch(`${API_URL}/top-opportunities`);
                if (!response.ok) throw new Error('فشل في جلب البيانات');
                
                const data = await response.json();
                
                const marketStatus = document.getElementById('marketStatus');
                marketStatus.className = `status-badge ${data.market_open ? 'market-open' : 'market-closed'}`;
                marketStatus.textContent = data.market_open ? '🟢 السوق مفتوح' : '🔴 السوق مغلق';
                
                document.getElementById('updateTime').textContent = `آخر تحديث: ${new Date(data.updated_at).toLocaleString('ar-SA')}`;

                grid.innerHTML = data.top_opportunities.map(stock => `
                    <div class="stock-card" onclick="showDetails('${stock.symbol}')">
                        <div class="stock-header">
                            <div class="stock-symbol">${stock.symbol}</div>
                            <div class="stock-price">$${stock.price}</div>
                        </div>
                        <div class="stock-name">${stock.name}</div>
                        <div class="stock-info">
                            <div class="info-item">
                                <span class="info-label">التغير %</span>
                                <span class="info-value ${stock.change_pct >= 0 ? 'positive' : 'negative'}">
                                    ${stock.change_pct >= 0 ? '+' : ''}${stock.change_pct}%
                                </span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">النقاط</span>
                                <span class="info-value">${stock.score}/13</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">RSI</span>
                                <span class="info-value">${stock.rsi}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">MACD</span>
                                <span class="info-value">${stock.macd}</span>
                            </div>
                        </div>
                        <div style="text-align: center;">
                            <span class="signal-badge ${getSignalClass(stock.signal)}">
                                ${getSignalArabic(stock.signal)}
                            </span>
                        </div>
                    </div>
                `).join('');

                loading.style.display = 'none';
                grid.style.display = 'grid';

            } catch (err) {
                loading.style.display = 'none';
                error.style.display = 'block';
                error.textContent = 'حدث خطأ في تحميل البيانات. يرجى المحاولة مرة أخرى.';
                console.error(err);
            }
        }

        async function searchStock() {
            const symbol = document.getElementById('searchInput').value.trim().toUpperCase();
            if (!symbol) {
                alert('الرجاء إدخال رمز السهم');
                return;
            }
            showDetails(symbol);
        }

        async function showDetails(symbol) {
            const modal = document.getElementById('detailModal');
            const modalBody = document.getElementById('modalBody');
            
            modal.style.display = 'block';
            modalBody.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>جاري تحليل السهم بواسطة Claude AI...</p>
                </div>
            `;

            try {
                const response = await fetch(`${API_URL}/analysis/${symbol}`);
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error('لم يتم العثور على بيانات لهذا السهم');
                    }
                    throw new Error('فشل في جلب التحليل');
                }
                
                const data = await response.json();
                
                document.getElementById('modalTitle').textContent = `${data.symbol} - ${data.name}`;
                document.getElementById('modalSubtitle').textContent = `السعر: $${data.price} | التغير: ${data.change_pct >= 0 ? '+' : ''}${data.change_pct}%`;

                let analysisHTML = `
                    <div class="summary-section">
                        <h2>📈 ملخص التقييم</h2>
                        <div class="summary-score">${data.score}/13</div>
                        <div class="summary-signal">${getSignalArabic(data.signal)}</div>
                    </div>
                `;

                if (data.confirmation) {
                    const conf = data.confirmation;
                    let verdictClass = 'watch';
                    if (conf.verdict.includes('ادخل')) verdictClass = 'enter';
                    else if (conf.verdict.includes('لا تدخل')) verdictClass = 'avoid';

                    analysisHTML += `
                        <div class="confirmation-section">
                            <div class="section-title">🔍 إشارات التأكيد</div>
                            
                            <div class="confirmation-signals">
                                <div class="signal-item ${conf.signals.obv === 'صاعد' ? 'positive' : 'negative'}">
                                    <div class="signal-label">OBV</div>
                                    <div class="signal-value">${conf.signals.obv}</div>
                                </div>
                                <div class="signal-item ${conf.signals.stochastic.includes('فرصة') ? 'positive' : conf.signals.stochastic.includes('حذر') ? 'negative' : 'neutral'}">
                                    <div class="signal-label">Stochastic</div>
                                    <div class="signal-value">${conf.signals.stochastic}</div>
                                </div>
                                <div class="signal-item ${conf.signals.candlestick === 'صاعد' ? 'positive' : conf.signals.candlestick === 'هابط' ? 'negative' : 'neutral'}">
                                    <div class="signal-label">Candlestick</div>
                                    <div class="signal-value">${conf.signals.candlestick}</div>
                                </div>
                                <div class="signal-item ${conf.signals.volume_profile === 'قوي' ? 'positive' : conf.signals.volume_profile === 'ضعيف' ? 'negative' : 'neutral'}">
                                    <div class="signal-label">Volume Profile</div>
                                    <div class="signal-value">${conf.signals.volume_profile}</div>
                                </div>
                            </div>

                            <div class="verdict-box">
                                <div class="verdict-score">${conf.positive_count}/${conf.total}</div>
                                <div class="verdict-text ${verdictClass}">${conf.verdict}</div>
                            </div>
                        </div>
                    `;
                }

                if (data.targets) {
                    let directionClass = 'neutral';
                    let directionIcon = '➡️';
                    let directionText = 'الاتجاه: محايد (مراقبة)';
                    let directionNote = '💡 السهم في منطقة محايدة - انتظر إشارات أوضح قبل الدخول';
                    
                    if (data.targets.direction === 'صاعد') {
                        directionClass = 'bullish';
                        directionIcon = '📈';
                        directionText = 'الاتجاه: صاعد (السعر متوقع يرتفع)';
                        directionNote = '✅ الأهداف للأعلى - إذا عندك من السهم احتفظ به ومتابعة الأهداف';
                    } else if (data.targets.direction === 'هابط') {
                        directionClass = 'bearish';
                        directionIcon = '📉';
                        directionText = 'الاتجاه: هابط (السعر متوقع ينزل)';
                        directionNote = '⚠️ الأهداف للأسفل - إذا عندك من السهم راقب وقف الخسارة بحذر!';
                    }

                    analysisHTML += `
                        <div class="analysis-section">
                            <div class="section-title">🎯 الأهداف المتوقعة</div>
                            
                            <div class="direction-banner ${directionClass}">
                                ${directionIcon} ${directionText}
                            </div>
                            
                            <div class="targets-grid">
                                <div class="target-box">
                                    <div class="target-label">نقطة الدخول</div>
                                    <div class="target-value">$${data.targets.entry}</div>
                                </div>
                                <div class="target-box">
                                    <div class="target-label">الهدف القصير</div>
                                    <div class="target-value ${data.targets.direction === 'صاعد' ? 'positive' : data.targets.direction === 'هابط' ? 'negative' : ''}">
                                        $${data.targets.target_short} ${data.targets.direction === 'صاعد' ? '⬆️' : data.targets.direction === 'هابط' ? '⬇️' : ''}
                                    </div>
                                </div>
                                <div class="target-box">
                                    <div class="target-label">الهدف المتوسط</div>
                                    <div class="target-value ${data.targets.direction === 'صاعد' ? 'positive' : data.targets.direction === 'هابط' ? 'negative' : ''}">
                                        $${data.targets.target_medium} ${data.targets.direction === 'صاعد' ? '⬆️' : data.targets.direction === 'هابط' ? '⬇️' : ''}
                                    </div>
                                </div>
                                <div class="target-box">
                                    <div class="target-label">وقف الخسارة</div>
                                    <div class="target-value ${data.targets.direction === 'صاعد' ? 'negative' : data.targets.direction === 'هابط' ? 'positive' : ''}">
                                        $${data.targets.stop_loss} ${data.targets.direction === 'صاعد' ? '⬇️' : data.targets.direction === 'هابط' ? '⬆️' : ''}
                                    </div>
                                </div>
                            </div>

                            <div class="direction-note">
                                ${directionNote}
                            </div>
                        </div>
                    `;
                }
                
                if (data.claude_analysis) {
                    const ca = data.claude_analysis;
                    analysisHTML += `
                        <div class="divider"></div>

                        <div class="analysis-section">
                            <div class="section-title">🎯 رأي Claude AI</div>
                            
                            <div class="confidence-box">
                                <div class="confidence-item">
                                    <div class="confidence-label">درجة الثقة</div>
                                    <div class="confidence-value">${ca.confidence}/100</div>
                                </div>
                                <div class="confidence-item">
                                    <div class="confidence-label">تقييم النجاح</div>
                                    <div class="confidence-value">${ca.success_rating}/10</div>
                                </div>
                                <div class="confidence-item">
                                    <div class="confidence-label">احتمالية الربح</div>
                                    <div class="confidence-value">${ca.profit_probability}%</div>
                                </div>
                            </div>

                            <div class="summary-text">
                                <strong>📝 الملخص:</strong><br>
                                ${ca.summary}
                            </div>

                            <div class="summary-text">
                                <strong>💡 التوصية النهائية:</strong><br>
                                ${ca.recommendation}
                            </div>
                        </div>

                        <div class="divider"></div>

                        <div class="analysis-section">
                            <div class="section-title">⚠️ المخاطر</div>
                            <div class="list-section">
                                <ul>
                                    ${ca.risks.map(risk => `<li class="risk-item">${risk}</li>`).join('')}
                                </ul>
                            </div>
                        </div>

                        <div class="analysis-section">
                            <div class="section-title">✅ الفرص</div>
                            <div class="list-section">
                                <ul>
                                    ${ca.opportunities.map(opp => `<li class="opportunity-item">${opp}</li>`).join('')}
                                </ul>
                            </div>
                        </div>

                        <div class="analysis-section">
                            <div class="section-title">⚡ التنبيهات الذكية</div>
                            <div class="list-section">
                                <ul>
                                    ${ca.alerts.map(alert => `<li class="alert-item">${alert}</li>`).join('')}
                                </ul>
                            </div>
                        </div>

                        <div class="divider"></div>

                        <div class="analysis-section">
                            <div class="section-title">💰 تحليل السيولة والقطاع</div>
                            <div class="summary-text">
                                ${ca.sector_flow}
                            </div>
                        </div>

                        <div class="analysis-section">
                            <div class="section-title">📊 النسبة التاريخية</div>
                            <div class="summary-text">
                                ${ca.historical_success}
                            </div>
                        </div>
                    `;
                }

                analysisHTML += `
                    <div class="divider"></div>

                    <div class="analysis-section">
                        <div class="section-title">📊 المؤشرات الفنية الكاملة</div>
                        <div class="indicators-grid">
                            <div class="indicator-box">
                                <div class="indicator-label">RSI</div>
                                <div class="indicator-value">${data.indicators.rsi}</div>
                            </div>
                            <div class="indicator-box">
                                <div class="indicator-label">MACD</div>
                                <div class="indicator-value">${data.indicators.macd}</div>
                            </div>
                            <div class="indicator-box">
                                <div class="indicator-label">ADX</div>
                                <div class="indicator-value">${data.indicators.adx}</div>
                            </div>
                            <div class="indicator-box">
                                <div class="indicator-label">MFI</div>
                                <div class="indicator-value">${data.indicators.mfi}</div>
                            </div>
                            <div class="indicator-box">
                                <div class="indicator-label">ATR</div>
                                <div class="indicator-value">${data.indicators.atr}</div>
                            </div>
                            <div class="indicator-box">
                                <div class="indicator-label">ROC</div>
                                <div class="indicator-value">${data.indicators.roc}%</div>
                            </div>
                            <div class="indicator-box">
                                <div class="indicator-label">SMA-20</div>
                                <div class="indicator-value">$${data.indicators.sma_20}</div>
                            </div>
                            <div class="indicator-box">
                                <div class="indicator-label">SMA-50</div>
                                <div class="indicator-value">$${data.indicators.sma_50}</div>
                            </div>
                            <div class="indicator-box">
                                <div class="indicator-label">EMA-9</div>
                                <div class="indicator-value">$${data.indicators.ema_9}</div>
                            </div>
                            <div class="indicator-box">
                                <div class="indicator-label">EMA-21</div>
                                <div class="indicator-value">$${data.indicators.ema_21}</div>
                            </div>
                        </div>
                    </div>

                    <div class="analysis-section">
                        <div class="section-title">💼 البيانات الأساسية</div>
                        <div class="indicators-grid">
                            <div class="indicator-box">
                                <div class="indicator-label">P/E Ratio</div>
                                <div class="indicator-value">${data.fundamentals.pe_ratio || 'N/A'}</div>
                            </div>
                            <div class="indicator-box">
                                <div class="indicator-label">EPS</div>
                                <div class="indicator-value">$${data.fundamentals.eps || 'N/A'}</div>
                            </div>
                            <div class="indicator-box">
                                <div class="indicator-label">Market Cap</div>
                                <div class="indicator-value">${(data.fundamentals.market_cap / 1e9).toFixed(1)}B</div>
                            </div>
                            <div class="indicator-box">
                                <div class="indicator-label">القطاع</div>
                                <div class="indicator-value">${data.fundamentals.sector}</div>
                            </div>
                        </div>
                    </div>

                    <div class="analysis-section">
                        <div class="section-title">📊 تحليل حجم التداول</div>
                        <div class="indicators-grid">
                            <div class="indicator-box">
                                <div class="indicator-label">الحجم الحالي</div>
                                <div class="indicator-value">${data.volume_analysis.current.toLocaleString()}</div>
                            </div>
                            <div class="indicator-box">
                                <div class="indicator-label">المتوسط</div>
                                <div class="indicator-value">${data.volume_analysis.average.toLocaleString()}</div>
                            </div>
                            <div class="indicator-box">
                                <div class="indicator-label">الفرق</div>
                                <div class="indicator-value ${data.volume_analysis.difference_pct >= 0 ? 'positive' : 'negative'}">
                                    ${data.volume_analysis.difference_pct >= 0 ? '+' : ''}${data.volume_analysis.difference_pct}%
                                </div>
                            </div>
                            <div class="indicator-box">
                                <div class="indicator-label">الاتجاه</div>
                                <div class="indicator-value">${data.volume_analysis.trend}</div>
                            </div>
                        </div>
                        ${data.volume_analysis.is_unusual ? '<div class="summary-text" style="background:#fff3cd;color:#856404;">⚠️ <strong>تحذير:</strong> حجم تداول غير طبيعي - راقب التلاعب المحتمل!</div>' : ''}
                    </div>
                `;

                if (data.claude_analysis && data.claude_analysis.glossary) {
                    analysisHTML += `
                        <div class="divider"></div>

                        <div class="analysis-section">
                            <div class="section-title">📖 شرح المصطلحات</div>
                            <div class="glossary-grid">
                                ${Object.entries(data.claude_analysis.glossary).map(([term, def]) => `
                                    <div class="glossary-item">
                                        <div class="glossary-term">${term}</div>
                                        <div class="glossary-definition">${def}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }

                modalBody.innerHTML = analysisHTML;

            } catch (err) {
                modalBody.innerHTML = `
                    <div class="error">
                        ${err.message || 'فشل في تحميل التحليل المفصل. يرجى المحاولة مرة أخرى.'}
                    </div>
                `;
                console.error(err);
            }
        }

        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
        }

        function getSignalClass(signal) {
            const map = {
                'Super Strong Buy': 'super-strong-buy',
                'Strong Buy': 'strong-buy',
                'Buy': 'buy',
                'Hold': 'hold',
                'Sell': 'sell'
            };
            return map[signal] || 'hold';
        }

        function getSignalArabic(signal) {
            const map = {
                'Super Strong Buy': 'شراء قوي جداً ⚡⚡⚡',
                'Strong Buy': 'شراء قوي',
                'Buy': 'راقب',
                'Hold': 'لا تدخل',
                'Sell': 'بيع'
            };
            return map[signal] || signal;
        }

        window.onclick = function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target == modal) {
                closeModal();
            }
        }

        loadData();
        setInterval(loadData, 600000);
    </script>
</body>
</html>
